# Dependabot — weekly, low-noise. The one hard rule: @supabase/ssr and
# @supabase/supabase-js MUST bump together (version skew scrambles the client's
# generic params and silently types query rows as `never` — see MEMORY.md).
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Majors are migrations, not bumps (Next 14 pin, Tailwind 3 token theme,
    # ESLint 8 config). Take them deliberately, with a local gate — not via PR.
    # (#6 was merged with a red check and broke npm ci on main — reverted.)
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      supabase:
        patterns:
          - "@supabase/*"
      next:
        patterns:
          - "next"
          - "eslint-config-next"
      dev-tooling:
        dependency-type: "development"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
