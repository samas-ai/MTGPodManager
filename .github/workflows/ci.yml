# CI — typecheck → lint → unit tests → pgTAP (RLS/finalize/stats) → build.
# Activates once this project is pushed to a GitHub repo (it is not a git repo yet).
# Mirrors the Tech Design "Development Workflow" gate; blocks merge on red.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm test

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase (local stack) and run pgTAP
        run: |
          supabase start
          supabase test db
          supabase stop

      - name: Production build
        run: npm run build
        env:
          # Dummy public values so `next build` can run without real secrets.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
