# CI — typecheck → lint → unit tests → pgTAP (RLS/finalize/stats) → build →
# Playwright E2E golden path (against the same local Supabase stack).
# Mirrors the Tech Design "Development Workflow" gate; blocks merge on red.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm test

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start Supabase (local stack) and run pgTAP
        run: |
          supabase start
          supabase test db

      # The stack stays up: the production build and the E2E run against it.
      - name: Export local Supabase credentials
        run: supabase status -o env | sed 's/"//g' | grep -E '^(API_URL|ANON_KEY)=' >> "$GITHUB_ENV"

      - name: Production build (against the local stack)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.API_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.ANON_KEY }}
          # Deterministic join-status transport for E2E (3s polling, no websocket).
          NEXT_PUBLIC_REALTIME_TRANSPORT: polling
          SCRYFALL_USER_AGENT: MTGPodManagerCI/1.0 (ci@example.com)
          # Let the prod CSP reach the local stack (unset in real deployments).
          CSP_EXTRA_CONNECT_SRC: http://127.0.0.1:54321 ws://127.0.0.1:54321

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E golden path (Playwright)
        run: |
          npm start &
          for i in $(seq 1 30); do curl -fs http://localhost:3000 >/dev/null && break; sleep 1; done
          E2E_RUN=1 npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.API_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.ANON_KEY }}
          SCRYFALL_USER_AGENT: MTGPodManagerCI/1.0 (ci@example.com)
          CSP_EXTRA_CONNECT_SRC: http://127.0.0.1:54321 ws://127.0.0.1:54321

      - name: Stop Supabase
        if: always()
        run: supabase stop
